name: 拼团H5自动化测试
url: http://localhost:8001/index.html  # 改成你实际的本地地址或部署地址

cases:
  - name: 商品列表页加载
    text: |
      打开商品列表页，验证页面能正常加载，
      验证三个商品（苹果、榴莲、车厘子）都显示在列表中，
      验证每个商品都有拼团价和原价

  - name: 进入商品详情页
    text: |
      在商品列表页点击第一个商品（苹果），
      验证能成功跳转到详情页，
      验证详情页显示商品名称和拼团价格

  - name: 开团功能
    text: |
      在商品详情页点击"我要开团"按钮，
      验证出现拼团倒计时，
      验证按钮变成"模拟拼团成功"

  - name: 拼团倒计时
    text: |
      开团后，验证倒计时正常显示（格式为 分:秒），
      验证倒计时每秒递减

  - name: 拼团成功
    text: |
      开团后，点击"模拟拼团成功"按钮，
      验证页面显示"拼团成功"状态，
      验证按钮变为灰色"已成团"

  - name: 拼团过期重开
    text: |
      开团后等待2分钟（或模拟过期），
      验证页面显示"拼团已结束"，
      验证"重新开团"按钮可点击