<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>商品详情 - 拼团购</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="detail-container" id="detailContainer"></div>
    <a href="index.html" class="back-link">← 返回列表</a>

    <script>
        // 完整商品数据（三个商品）
        const goodsData = {
            1: {
                id: 1,
                name: "新疆阿克苏苹果 5斤装",
                groupPrice: 29.9,
                originalPrice: 59,
                img: "🍎",
                needPeople: 2
            },
            2: {
                id: 2,
                name: "泰国金枕头榴莲 3-4斤",
                groupPrice: 89.9,
                originalPrice: 159,
                img: "榴莲",
                needPeople: 2
            },
            3: {
                id: 3,
                name: "进口车厘子 JJ级 2斤",
                groupPrice: 69.9,
                originalPrice: 129,
                img: "🍒",
                needPeople: 2
            }
        };

        // 拼团状态管理
        let groupStatus = {
            status: 'waiting',  // waiting: 待成团, success: 已成团, expired: 已过期
            endTime: null
        };

        let countdownInterval = null;
        let currentGoodsId = null;

        // 获取URL参数
        function getUrlParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        // 加载拼团状态（从localStorage读取，按商品ID区分）
        function loadGroupStatus(goodsId) {
            const saved = localStorage.getItem(`group_${goodsId}`);
            if (saved) {
                const data = JSON.parse(saved);
                // 检查是否过期
                if (data.status === 'waiting' && data.endTime && Date.now() > data.endTime) {
                    return { status: 'expired', endTime: null };
                }
                return data;
            }
            return { status: 'waiting', endTime: null };
        }

        // 保存拼团状态
        function saveGroupStatus(goodsId, status) {
            localStorage.setItem(`group_${goodsId}`, JSON.stringify(status));
        }

        // 开始拼团（开团）
        function startGroup(goodsId) {
            const endTime = Date.now() + 2 * 60 * 1000; // 倒计时2分钟（演示用）
            const newStatus = {
                status: 'waiting',
                endTime: endTime
            };
            groupStatus = newStatus;
            saveGroupStatus(goodsId, newStatus);
            renderDetail(goodsId);
            startCountdown(goodsId);
        }

        // 倒计时逻辑
        function startCountdown(goodsId) {
            if (countdownInterval) clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                const saved = loadGroupStatus(goodsId);
                if (saved.status !== 'waiting' || !saved.endTime) {
                    clearInterval(countdownInterval);
                    return;
                }

                const remaining = saved.endTime - Date.now();
                if (remaining <= 0) {
                    // 拼团过期
                    clearInterval(countdownInterval);
                    const expiredStatus = { status: 'expired', endTime: null };
                    groupStatus = expiredStatus;
                    saveGroupStatus(goodsId, expiredStatus);
                    renderDetail(goodsId);
                } else {
                    groupStatus = saved;
                    updateCountdownDisplay(remaining);
                }
            }, 1000);
        }

        // 更新倒计时显示
        function updateCountdownDisplay(remaining) {
            const countdownEl = document.getElementById('countdown');
            if (countdownEl) {
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                countdownEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        // 模拟拼团成功（演示用）
        function mockGroupSuccess(goodsId) {
            const successStatus = { status: 'success', endTime: null };
            groupStatus = successStatus;
            saveGroupStatus(goodsId, successStatus);
            if (countdownInterval) clearInterval(countdownInterval);
            renderDetail(goodsId);
        }

        // 渲染详情页
        function renderDetail(goodsId) {
            const goods = goodsData[goodsId];
            if (!goods) {
                document.getElementById('detailContainer').innerHTML = '<div style="padding:20px;text-align:center">商品不存在</div>';
                return;
            }

            const status = loadGroupStatus(goodsId);
            groupStatus = status;

            let groupBoxHtml = '';

            if (status.status === 'waiting' && status.endTime) {
                // 拼团进行中
                const remaining = status.endTime - Date.now();
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                const timeText = remaining > 0 ? `${minutes}:${seconds.toString().padStart(2, '0')}` : '0:00';

                groupBoxHtml = `
                    <div class="group-box">
                        <div class="group-header">
                            <span>👥 拼团进行中</span>
                            <span class="countdown">剩余: <span id="countdown">${timeText}</span></span>
                        </div>
                        <div class="group-price-large">${goods.groupPrice}</div>
                        <div>还差 <strong>1</strong> 人成团</div>
                        <button class="group-btn" onclick="mockGroupSuccess(${goodsId})">🎉 模拟拼团成功（演示）</button>
                        <div class="status-tip">等待好友参团中...</div>
                    </div>
                `;
            } else if (status.status === 'success') {
                // 拼团成功
                groupBoxHtml = `
                    <div class="group-box">
                        <div class="group-header">
                            <span>🎉 拼团成功！</span>
                        </div>
                        <div class="group-price-large">${goods.groupPrice}</div>
                        <button class="group-btn disabled" disabled>已成团</button>
                        <div class="status-tip">恭喜！拼团已完成</div>
                    </div>
                `;
            } else if (status.status === 'expired') {
                // 拼团过期
                groupBoxHtml = `
                    <div class="group-box">
                        <div class="group-header">
                            <span>⏰ 拼团已结束</span>
                        </div>
                        <div class="group-price-large">${goods.groupPrice}</div>
                        <button class="group-btn" onclick="startGroup(${goodsId})">重新开团</button>
                        <div class="status-tip">拼团超时，可重新开团</div>
                    </div>
                `;
            } else {
                // 未开团
                groupBoxHtml = `
                    <div class="group-box">
                        <div class="group-header">
                            <span>👥 2人成团</span>
                        </div>
                        <div class="group-price-large">${goods.groupPrice}</div>
                        <div>单独购买 ¥${goods.originalPrice}</div>
                        <button class="group-btn" onclick="startGroup(${goodsId})">🔥 我要开团</button>
                        <div class="status-tip">邀请好友一起拼团更划算</div>
                    </div>
                `;
            }

            const html = `
                <div class="detail-img">${goods.img}</div>
                <div class="detail-info">
                    <div class="detail-name">${goods.name}</div>
                    ${groupBoxHtml}
                </div>
            `;

            document.getElementById('detailContainer').innerHTML = html;

            // 启动倒计时（如果是waiting状态且还有剩余时间）
            if (status.status === 'waiting' && status.endTime) {
                const remaining = status.endTime - Date.now();
                if (remaining > 0) {
                    startCountdown(goodsId);
                } else {
                    // 已过期，更新状态
                    const expiredStatus = { status: 'expired', endTime: null };
                    saveGroupStatus(goodsId, expiredStatus);
                    renderDetail(goodsId);
                }
            }
        }

        // 初始化
        currentGoodsId = parseInt(getUrlParam('id'));
        if (currentGoodsId && goodsData[currentGoodsId]) {
            renderDetail(currentGoodsId);
        } else {
            // 无效ID，跳回首页
            alert('商品不存在，返回列表页');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
